<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5em;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 700;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 15px 30px;
            background: #333;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: #555;
            transform: translateY(-2px);
        }

        section {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.4em;
            margin-bottom: 25px;
            padding: 20px;
            background: #333;
            border-left: 5px solid #666;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }
            
            nav {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            section {
                padding: 30px 25px;
                margin: 20px;
            }
            
            p {
                font-size: 1.2em;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📞 Contact Me</h1>
        <nav>

            <a href="about.html">ℹ️ About</a>

            <a href="gallery.html">🖼️ Gallery</a>
            <a href="contact.html">📱 Contact</a>
        </nav>
    </header>

    </section>
</body>
</html>
