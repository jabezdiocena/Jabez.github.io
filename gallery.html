<!DOCTYPE html>

<head>
    <title>Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f7d794 0%, #f5c26d 50%, #f9e4b7 100%);
            color: #6b4e31;
            min-height: 100vh;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 4em;
            background: linear-gradient(45deg, #d4a017, #f4b400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(244,180,0,0.5);
            font-weight: 700;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            color: #6b4e31;
            text-decoration: none;
            font-weight: 600;
            padding: 15px 30px;
            background: rgba(255,255,255,0.7);
            border: 2px solid rgba(212,160,23,0.3);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        nav a:hover {
            background: #f4b400;
            color: white;
            border-color: #d4a017;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(244,180,0,0.4);
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }

        .photo-frame {
            background: rgba(255,255,255,0.8);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
            border: 3px solid rgba(244,180,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #d4a017, #f4b400);
        }

        .photo-frame:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 70px rgba(244,180,0,0.3);
            border-color: #f4b400;
        }

        .photo-frame img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            transition: all 0.4s ease;
        }

        .photo-frame:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .photo-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(45deg, #f4b400, #ffd700);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #6b4e31;
            font-weight: bold;
            border: 3px dashed rgba(107,78,49,0.3);
        }

        .section-title {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 40px;
            color: #6b4e31;
            font-weight: 700;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #d4a017, #f4b400);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.8em;
            }
            
            nav {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            nav a {
                padding: 12px 25px;
                width: 220px;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }
    </style>
</head>
